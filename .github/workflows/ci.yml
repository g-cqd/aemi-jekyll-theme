name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & gem package check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build the gem
        run: gem build aemi.gemspec

      - name: Smoke build (Jekyll serves the demo content)
        run: bundle exec jekyll build --strict_front_matter
        env:
          JEKYLL_ENV: production
